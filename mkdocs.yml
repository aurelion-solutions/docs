site_name: Aurelion Documentation
site_description: Aurelion Identity Security Platform
site_url: https://docs.aurelion.io

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share

nav:

  - Home: index.md

  - Concepts:
